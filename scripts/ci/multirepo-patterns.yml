# AST-grep rules for detecting raw .omac path constructions that bypass resolveSessionStatePaths.
# Any match outside the whitelisted files is a contract violation.
# Whitelist is enforced in check-multirepo-paths.mjs, not here.

rules:
  - id: join-omac-literal-single
    language: TypeScript
    rule:
      pattern: join($_, '.omac', $$$)
    message: "Raw join(..., '.omac', ...) detected — use resolveSessionStatePaths() or getOmacRoot() instead"

  - id: join-omac-literal-double
    language: TypeScript
    rule:
      pattern: join($_, ".omac", $$$)
    message: "Raw join(..., \".omac\", ...) detected — use resolveSessionStatePaths() or getOmacRoot() instead"

  - id: template-omac-forward-slash
    language: TypeScript
    rule:
      pattern: "`${$_}/.omac/$$$`"
    message: "Raw template `.../.omac/...` detected — use resolveSessionStatePaths() or getOmacRoot() instead"

  - id: template-omac-backslash
    language: TypeScript
    rule:
      pattern: "`${$_}\\.omac\\$$$`"
    message: "Raw template `...\\.omac\\...` detected — use resolveSessionStatePaths() or getOmacRoot() instead"

  - id: path-join-omac
    language: TypeScript
    rule:
      pattern: path.join($_, '.omac', $$$)
    message: "Raw path.join(..., '.omac', ...) detected — use resolveSessionStatePaths() or getOmacRoot() instead"

  - id: join-omac-literal-single-js
    language: JavaScript
    rule:
      pattern: join($_, '.omac', $$$)
    message: "Raw join(..., '.omac', ...) detected — use resolveOmacStateRoot() instead"

  - id: join-omac-literal-double-js
    language: JavaScript
    rule:
      pattern: join($_, ".omac", $$$)
    message: "Raw join(..., \".omac\", ...) detected — use resolveOmacStateRoot() instead"

  - id: template-omac-forward-slash-js
    language: JavaScript
    rule:
      pattern: "`${$_}/.omac/$$$`"
    message: "Raw template `.../.omac/...` detected — use resolveOmacStateRoot() instead"

  - id: path-join-omac-js
    language: JavaScript
    rule:
      pattern: path.join($_, '.omac', $$$)
    message: "Raw path.join(..., '.omac', ...) detected — use resolveOmacStateRoot() instead"
